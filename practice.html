<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
</head>
<body>
  <h2>Simple Calculator</h2>

  <!-- Input Textboxes -->
  <input type="text" id="num1" placeholder="Enter first number">
  <input type="text" id="num2" placeholder="Enter second number">
  
  <br><br>

  <!-- Radio Buttons -->
  <label>
    <input type="radio" name="operation" value="add" onclick="calculate()"> +
  </label>
  <label>
    <input type="radio" name="operation" value="multiply" onclick="calculate()"> -
  </label>

  <br><br>

  <!-- Result Textbox -->
  <input type="text" id="result" placeholder="Result" readonly>

  <br><br>

  <!-- Reset Button -->
  <button onclick="resetCalculator()">Reset</button>

  <script>
    function calculate() {
      let n1 = document.getElementById("num1").value.trim();
      let n2 = document.getElementById("num2").value.trim();
      let resultBox = document.getElementById("result");

      // Basic validation
      if (n1 === "" || n2 === "") {
        alert("Please enter both numbers");
        return;
      }

      let num1 = parseFloat(n1);
      let num2 = parseFloat(n2);

      if (isNaN(num1) || isNaN(num2)) {
        alert("Please enter valid numbers");
        return;
      }

      // Check selected operation
      let operation = document.querySelector('input[name="operation"]:checked').value;

      let result;
      if (operation === "add") {
        result = num1 + num2;
      } else if (operation === "multiply") {
        result = num1 - num2;
      }

      resultBox.value = result;
    }

    function resetCalculator() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
      document.getElementById("result").value = "";
      
      // Uncheck radio buttons
      let radios = document.getElementsByName("operation");
      radios.forEach(r => r.checked = false);
    }
  </script>
</body>
</html>
