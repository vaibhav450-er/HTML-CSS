<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <label for="num">Enter Number</label>
  <input type="number" id="num" autofocus required>

  <label for="result">Result</label>
  <input type="text" id="result">

  <button onclick="calculate()">calculate factorial </button>

  <script>
    

    const factorial=(n)=>{
      let fact=1;
      for(let i=1;i<=n;i++){
        fact*=i;
      }
      return fact;
    }

    const calculate=()=>{
      let num=document.getElementById("num").value;
      let result=document.getElementById("result");

      if(num===""){
        result.value="Enter a valid number";
      }

      if(num<0){
        result.value="Enter a positive number";
      }

      let res=factorial(num);
      result.value=res;


    }
  </script>
</body>
</html>
