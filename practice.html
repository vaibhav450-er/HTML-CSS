<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <input type="text" id="num">
  <button onclick="fibo()">generate</button>
  <textarea id="result"></textarea>

  ><Script>
    const fibo=()=>{

    let num=document.getElementById("num").value;
    let result=document.getElementById("result");
    num=Number(num);
    let a=0;
    let b=1;
    let c;
    let series="";
    for(let i=1;i<=num;i++){
      series=series+a+" ";
      c=a+b;
      a=b;
      b=c;

    }
    result.value=series;


    };
  </Script>
</body>
</html>
