<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=[10,20,30,40];
        let b=[50,60,70,80];
        let c=a.concat(b);
        console.log(c);
        a.push(50);
        document.write(a+"<br>");
        a.pop();
        document.write(a+"<br>");
        a.shift();
        document.write(a+"<br>");
        a.unshift(10);
        document.write(a+"<br>");
        console.log(a.toString());
        console.log(a);
    </script>
</body>
</html>
