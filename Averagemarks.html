<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=[10,20,30];
        let sum=0;
        for(let arr of a){
            sum+=arr;
        }
        document.write(sum+"<br>");
        let avg=sum/a.length;
        document.write(avg);
    </script>
</body>
</html>
